name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Print runtime versions
        run: node -v && npm -v

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund --loglevel verbose || {
            echo "npm ci failed on runner; falling back to npm install"
            npm install --no-audit --no-fund --loglevel verbose
          }

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
